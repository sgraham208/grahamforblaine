<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stephen Graham — Secretario del Condado de Blaine</title>
  <meta name="description" content="Stephen Graham para Secretario del Condado de Blaine. Elecciones justas. Presupuestos honestos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;0,900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-navy: #1B2A4A;
      --color-gold: #C8953D;
      --color-cream: #FAF8F5;
      --color-text: #2C2C2C;
      --color-white: #FFFFFF;
      --font-display: 'Merriweather', Georgia, serif;
      --font-body: 'Source Sans 3', 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-cream);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--color-navy);
      border-bottom: 3px solid var(--color-gold);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header img {
      height: 36px;
      width: auto;
    }

    .header a {
      color: var(--color-white);
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .lang-switch {
      color: var(--color-gold);
      border: 1px solid var(--color-gold);
      padding: 0.25rem 0.625rem;
      border-radius: 3px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .lang-switch:hover {
      background: var(--color-gold);
      color: var(--color-navy);
    }

    .lang-switch:focus-visible {
      outline: 3px solid var(--color-gold);
      outline-offset: 3px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .content {
      max-width: 36rem;
      text-align: center;
    }

    .content h1 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      color: var(--color-navy);
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    .content p {
      font-size: 1.125rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .content a {
      color: var(--color-navy);
      font-weight: 600;
    }

    .footer {
      background: var(--color-navy);
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.9375rem;
    }
  </style>
</head>
<body>

<header class="header">
  <a href="/es">
    <img src="https://grahamforblaine.com/logo_white.png" alt="Graham para Secretario del Condado de Blaine" />
  </a>
  <a href="/" class="lang-switch" lang="en" aria-label="View in English">English</a>
</header>

<main>
  <div class="content">
    <h1>Traducción al español próximamente</h1>
    <p>Estamos preparando una versión en español de este sitio. Mientras tanto, puede contactarnos en español:</p>
    <p><a href="mailto:info@grahamforblaine.com">info@grahamforblaine.com</a></p>
    <p>Elecciones justas. Presupuestos honestos. Cuente con ello.</p>
  </div>
</main>

<footer class="footer">
  <p>Pagado por Graham for Blaine County Clerk</p>
</footer>

</body>
</html>
