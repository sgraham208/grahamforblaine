    tab.className = 'tab' + (id === currentSession ? ' active' : '');
    tab.textContent = name + ' (' + done + '/' + total + ')';
    tab.onclick = () => { currentSession = id; render(); };
    t.appendChild(tab);
  }
}

function renderProgress() {
  const doors = DATA[currentSession].doors;
  const done = doors.filter(d => results[d.route_num]?.done).length;
  document.getElementById('progress').innerHTML =
    '<div><span class="count">' + done + ' / ' + doors.length + '</span> doors logged</div>' +
    '<button class="export-btn" onclick="exportResults()">Copy Results</button>';
}

function partyTag(p) {
  const labels = {D:'DEM', U:'UNA', R:'REP'};
  return '<span class="tag tag-' + p + '">' + (labels[p]||p) + '</span>';
}

function renderDoors() {
  const container = document.getElementById('doors');
  container.innerHTML = '';
  const doors = DATA[currentSession].doors;

  doors.forEach(d => {
    const r = results[d.route_num] || {};
    const div = document.createElement('div');
    div.className = 'door' + (r.done ? ' done' : '');
    div.id = 'door-' + d.route_num;

    const voterSummary = d.voters.map(v => v.name.split(' ')[0]).join(', ');
    const provenHtml = d.proven > 0 ? ' <span class="proven-badge">PROVEN</span>' : '';

    let votersHtml = d.voters.map(v =>
      '<div class="voter"><div class="voter-name">' + partyTag(v.party) + ' ' + v.name + '</div>' +
      '<div class="voter-info">Age ' + v.age +
      (v.phone ? ' &bull; ' + v.phone : '') +
      (v.ballot_hx && v.ballot_hx !== '\u2014' ? ' &bull; ' + v.ballot_hx : '') +
      '</div></div>'
    ).join('');

    const supportOpts = ['Strong','Lean','Undecided','Lean Opp','Opp','Refused'];
    const yardOpts = ['Yes','No'];
    const endorseOpts = ['Y-name','Y-letter','Maybe'];
    const primaryOpts = ['Knew','Learned','N/A'];

    function optHtml(field, opts, style) {
      return opts.map(o => {
        const sel = r[field] === o;
        const cls = sel ? (style || 'selected') : '';
        return '<div class="opt ' + cls + '" data-door="' + d.route_num + '" data-field="' + field + '" data-val="' + o + '" onclick="setOpt(this)">' + o + '</div>';
      }).join('');
    }

    div.innerHTML =
      '<div class="door-hdr" onclick="toggleDoor(' + d.route_num + ')">' +
        '<div class="left"><div class="door-num">' + d.route_num + '</div><div><div class="door-addr">' + d.address + provenHtml + '</div><div class="door-meta">' + d.voters.length + ' voter' + (d.voters.length>1?'s':'') + ' &bull; ' + voterSummary + '</div></div></div>' +
        (r.done ? '<span style="color:var(--green);font-size:20px;">&#10003;</span>' : '') +
      '</div>' +
      '<div class="door-body">' +
        votersHtml +
        '<div class="survey">' +
          '<div class="survey-row"><div class="survey-label">Support</div><div class="options">' + optHtml('support', supportOpts) + '</div></div>' +
          '<div class="survey-row"><div class="survey-label">Yard Sign</div><div class="options">' + optHtml('yard', yardOpts, 'selected-green') + '</div></div>' +
          '<div class="survey-row"><div class="survey-label">Endorsement</div><div class="options">' + optHtml('endorse', endorseOpts, 'selected-green') + '</div></div>' +
          '<div class="survey-row"><div class="survey-label">Open Primary</div><div class="options">' + optHtml('primary', primaryOpts) + '</div></div>' +
          '<div class="survey-row"><div class="survey-label">Notes</div><textarea class="notes-input" rows="2" placeholder="Quick note..." onchange="setNote(' + d.route_num + ', this.value)">' + (r.notes||'') + '</textarea></div>' +
        '</div>' +
        '<button class="done-btn ' + (r.done ? 'undo' : 'mark') + '" onclick="markDone(' + d.route_num + ')">' + (r.done ? 'Undo — Reopen' : '✓ Done — Next Door') + '</button>' +
        '<button class="no-answer-btn" onclick="noAnswer(' + d.route_num + ')">No Answer — Leave Card</button>' +
      '</div>';

    container.appendChild(div);
  });
}

function render() { renderTabs(); renderProgress(); renderDoors(); }

function toggleDoor(num) {
  const el = document.getElementById('door-' + num);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.door.open').forEach(d => d.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}

function setOpt(el) {
  const num = el.dataset.door;
  const field = el.dataset.field;
  const val = el.dataset.val;
  if (!results[num]) results[num] = {};
  results[num][field] = results[num][field] === val ? null : val;
  save(); render();
  // reopen the door
  document.getElementById('door-' + num).classList.add('open');
}

function setNote(num, val) {
  if (!results[num]) results[num] = {};
  results[num].notes = val;
  save();
}

function markDone(num) {
  if (!results[num]) results[num] = {};
  results[num].done = !results[num].done;
  save(); render();
  // auto-open next door
  if (results[num].done) {
    const doors = DATA[currentSession].doors;
    const idx = doors.findIndex(d => d.route_num === num);
    if (idx < doors.length - 1) {
      const next = doors[idx+1].route_num;
      setTimeout(() => {
        const el = document.getElementById('door-' + next);
        el.classList.add('open');
        el.scrollIntoView({behavior:'smooth', block:'start'});
      }, 200);
    }
  }
}

function noAnswer(num) {
  if (!results[num]) results[num] = {};
  results[num].support = 'No Answer';
  results[num].done = true;
  save(); render();
  showToast('No answer — card left');
  const doors = DATA[currentSession].doors;
  const idx = doors.findIndex(d => d.route_num === num);
  if (idx < doors.length - 1) {
    const next = doors[idx+1].route_num;
    setTimeout(() => {
      const el = document.getElementById('door-' + next);
      el.classList.add('open');
      el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 300);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1500);
}

function exportResults() {
  let lines = ['CANVASS RESULTS — SW Hailey — ' + new Date().toLocaleDateString()];
  lines.push('');
  let totalDone = 0, totalYard = 0, totalEndorse = 0;
  for (const [sid, sdata] of Object.entries(DATA)) {
    lines.push('=== ' + SESSION_NAMES[sid] + ' ===');
    sdata.doors.forEach(d => {
      const r = results[d.route_num];
      if (!r || !r.done) return;
      totalDone++;
      if (r.yard === 'Yes') totalYard++;
      if (r.endorse === 'Y-name' || r.endorse === 'Y-letter') totalEndorse++;
      let line = '#' + d.route_num + ' ' + d.address + ' | ' + (r.support||'—');
      if (r.yard === 'Yes') line += ' | YARD SIGN';
      if (r.endorse) line += ' | Endorse: ' + r.endorse;
      if (r.primary && r.primary !== 'N/A') line += ' | Primary: ' + r.primary;
      if (r.notes) line += ' | ' + r.notes;
      lines.push(line);
    });
    lines.push('');
  }
  lines.push('TOTALS: ' + totalDone + ' doors contacted | ' + totalYard + ' yard signs | ' + totalEndorse + ' endorsements');
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Results copied!')).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Results copied!');
  });
}

render();
</script>
</body>
</html>
